    <!--javascript include-->
    <script>
      //Datatables search
      $(document).ready(function () {
        var xmlhttp = new XMLHttpRequest();
        var url = "js/listpaper.json";
        xmlhttp.open("GET", url, true);
        xmlhttp.send();
        xmlhttp.onreadystatechange = function () {
          if (this.readyState == 4 && this.status == 200) {
            var data = JSON.parse(this.responseText);
            console.log(data);
            $("#table-paper").DataTable({
              // "ajax":data/object.txt,
              responsive: true,
              data: data.paper,
              columns: [
                { data: "judul" },
                { data: "jenis" },
                {
                    data:"file", // Target the first column (index 0)
                    "render": function(data, type, row, meta) {
                        if (type === 'display') {
                            return '<a href="assets/doc/' + data + '" target="_blank"> Unduh </a>';
                        }
                        return data;
                    }
                },
              ],
              lengthMenu: [
                [5, 25, 50, -1],
                [5, 25, 50, "All"],
              ],
              dom: "Bfrtip",
              buttons: [],
            });
          }
        };
      });
    </script>
