    <script>
      //Datatables search
      $(document).ready(function () {
        var xmlhttp = new XMLHttpRequest();
        var url = "../assets/js/listcode.json";
        xmlhttp.open("GET", url, true);
        xmlhttp.send();
        xmlhttp.onreadystatechange = function () {
          if (this.readyState == 4 && this.status == 200) {
            var data = JSON.parse(this.responseText);
            console.log(data);
            $("#table-code").DataTable({
              // "ajax":data/object.txt,
              responsive: true,
              data: data.code,
              columns: [
                { data: "name" },
                { data: "tech" },
                {
                    data:"view", // Target the first column (index 0)
                    "render": function(data, type, row, meta) {
                        if (type === 'display') {
                            return '<a href="' + data + '" class="btn btn-danger" target="_blank" title="Demo" alt="Demo"><i class="bi bi-eye"></i></a>';
                        }
                        return data;
                    }
                },
                {
                    data:"download", // Target the first column (index 0)
                    "render": function(data, type, row, meta) {
                        if (type === 'display') {
                            return '<a href="' + data + '" class="btn btn-primary" target="_blank" title="Download" alt="Download"><i class="bi bi-download"></i></a>';
                        }
                        return data;
                    }
                },
              ],
              lengthMenu: [
                [3, 24, 60, -1],
                [3, 24, 60, "All"],
              ],
              dom: "Bfrtip",
              buttons: [],
            });
          }
        };
      });
    </script>
